<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="用 742 个中国传统色生成单色渐变逻辑卡，展示浅阶、本色、邻近、深阶、双色和渐变组合。">
    <meta name="theme-color" content="#f7f7f4" data-theme-color>
    <title>渐变逻辑 - 中国传统配色</title>
    <link rel="icon" href="favicon.svg?v=20260610-6" type="image/svg+xml">
    <script>
      (() => {
        try {
          const theme = localStorage.getItem('theme');
          if (theme === 'dark' || theme === 'light') {
            document.documentElement.dataset.theme = theme;
          }
        } catch (error) {
          document.documentElement.dataset.theme = 'light';
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css?v=20260614-4">
    <link rel="stylesheet" href="assets/css/color-suggestions.css?v=20260614-1">
    <link rel="stylesheet" href="assets/css/gradients.css?v=20260614-1">
    <script src="https://code.iconify.design/iconify-icon/3.0.0/iconify-icon.min.js" defer></script>
  </head>
  <body data-current-page="gradients">
    <a class="skip-link" href="#gradient-grid">跳到渐变逻辑卡片</a>

    <div data-shared-header></div>

    <main class="gradient-page">
      <section class="gradient-section" aria-labelledby="gradient-list-title">
        <div class="section-heading">
          <span class="section-kicker">Color Palette Cards</span>
          <h2 id="gradient-list-title">传统色渐变卡</h2>
          <p>搜索色名、编号或 HEX；点击卡片可复制这张卡的完整渐变逻辑。</p>
        </div>

        <div class="gradient-toolbar" aria-label="渐变逻辑工具">
          <label class="gradient-search">
            <span class="sr-only">检索渐变逻辑</span>
            <iconify-icon icon="lucide:search" aria-hidden="true"></iconify-icon>
            <input type="search" data-gradient-search data-color-suggest placeholder="搜索色名 / 编号 / HEX" autocomplete="off">
          </label>
          <label class="gradient-filter">
            <span class="sr-only">按色系筛选</span>
            <select data-gradient-hue aria-label="按色系筛选">
              <option value="all">全部色系</option>
              <option value="red">红色系</option>
              <option value="orange">橙色系</option>
              <option value="yellow">黄色系</option>
              <option value="green">绿色系</option>
              <option value="cyan">青色系</option>
              <option value="blue">蓝色系</option>
              <option value="purple">紫色系</option>
              <option value="neutral">中性色</option>
            </select>
          </label>
          <button class="gradient-action" type="button" data-gradient-random>
            <iconify-icon icon="lucide:shuffle" aria-hidden="true"></iconify-icon>
            随机一色
          </button>
        </div>

        <div class="gradient-meta">
          <span data-gradient-count aria-live="polite">正在读取渐变逻辑</span>
          <span>每张卡可复制色阶与渐变路径</span>
        </div>

        <div class="gradient-grid" id="gradient-grid" data-gradient-grid></div>
        <div class="gradient-more">
          <button class="gradient-load" type="button" data-gradient-load-more>
            <iconify-icon icon="lucide:chevron-down" aria-hidden="true"></iconify-icon>
            加载更多
          </button>
        </div>
      </section>
    </main>

    <div data-shared-footer></div>

    <div class="gradient-toast" data-gradient-toast role="status" aria-live="polite"></div>

    <script src="assets/js/shared-chrome.js?v=20260614-3" defer></script>
    <script src="assets/data/images.js?v=20260610-6" defer></script>
    <script src="assets/data/harmonies.js?v=20260610-6" defer></script>
    <script src="assets/js/color-search-suggestions.js?v=20260614-1" defer></script>
    <script src="assets/js/gradients.js?v=20260614-1" defer></script>
  </body>
</html>
